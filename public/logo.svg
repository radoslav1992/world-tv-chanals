<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" fill="none" role="img" aria-label="World TV Channels">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2338"/>
      <stop offset="1" stop-color="#0e1220"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#74a0ff"/>
      <stop offset="1" stop-color="#3f6fe0"/>
    </linearGradient>
    <clipPath id="screenClip">
      <rect x="86" y="116" width="340" height="228" rx="30"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="116" fill="url(#bg)"/>
  <rect x="9" y="9" width="494" height="494" rx="108" fill="none" stroke="#5b8cff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- stand -->
  <rect x="246" y="340" width="20" height="44" fill="#2a3350"/>
  <rect x="190" y="382" width="132" height="18" rx="9" fill="#3a456a"/>

  <!-- screen -->
  <rect x="86" y="116" width="340" height="228" rx="30" fill="url(#screen)"/>

  <!-- faint globe grid -->
  <g clip-path="url(#screenClip)" stroke="#ffffff" stroke-opacity="0.22" stroke-width="4" fill="none">
    <circle cx="256" cy="230" r="90"/>
    <ellipse cx="256" cy="230" rx="38" ry="90"/>
    <line x1="168" y1="230" x2="344" y2="230"/>
    <line x1="184" y1="192" x2="328" y2="192"/>
    <line x1="184" y1="268" x2="328" y2="268"/>
  </g>

  <!-- play mark -->
  <path d="M236 184 L236 276 L320 230 Z" fill="#ffffff"/>

  <!-- screen edge highlight -->
  <rect x="86" y="116" width="340" height="228" rx="30" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>
</svg>
